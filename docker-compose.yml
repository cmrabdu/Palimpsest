services:
  palimpsest:
    build: .
    container_name: palimpsest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8790:8000"
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./output:/app/output
      - ./.cache:/app/.cache
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5).read()\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
